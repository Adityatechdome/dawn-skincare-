name: Deploy to Shopify

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Deploy to Shopify
        uses: Shopify/shopify-cli-action@v1
        with:
          os: ubuntu-latest
        env:
          SHOPIFY_CLI_TOKEN: ${{ secrets.SHOPIFY_CLI_TOKEN }}
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
